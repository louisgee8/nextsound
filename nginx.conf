server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # Security headers (Phase 3 Step 3, Pass 1)
    # ============================================
    # The 'always' flag makes nginx attach these to ALL responses, including
    # error responses (4xx/5xx). Without it, the headers would be skipped on
    # error pages — which is the exact case where an attacker is most likely
    # to be probing your defenses. Always use 'always'.

    # Clickjacking defense. DENY = your pages can never be loaded inside any
    # <iframe>, even on your own site. If you ever need to embed (you don't,
    # this is a music app, not a widget), switch to SAMEORIGIN.
    add_header X-Frame-Options "DENY" always;

    # MIME sniffing defense. Forces browsers to honor the Content-Type header
    # we send instead of "guessing" by inspecting bytes. Without this, an
    # uploaded image with a JavaScript payload could be executed as JS.
    add_header X-Content-Type-Options "nosniff" always;

    # Privacy / info-leak defense. When users click an external link, the
    # browser normally sends the FULL current URL (including query params,
    # which may contain search terms or auth tokens) as the Referer header.
    # 'strict-origin-when-cross-origin' sends only the origin (scheme + host)
    # to cross-origin destinations, and nothing at all on HTTPS->HTTP downgrades.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS: instruct browsers to ALWAYS use HTTPS for this domain (and all
    # subdomains) for the next year. After the first successful HTTPS load,
    # the browser refuses to send unencrypted HTTP at all — defeats SSL-strip
    # MITM attacks. Fly.io terminates TLS at the edge so by the time our
    # container responds, the request is already over HTTPS.
    # NOTE: includeSubDomains is safe here because we control the apex.
    # 'preload' is intentionally OMITTED — that's a one-way commitment to
    # being on the HSTS preload list and very hard to reverse. Not needed
    # for portfolio use; revisit after the app has been stable for months.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy (Phase 3 Step 3, Pass 2)
    # ---------------------------------------------------------------
    # XSS defense at the browser layer. If an attacker manages to inject
    # markup into our DOM, CSP refuses to execute scripts from origins not
    # in this allowlist. Even if input sanitization fails, CSP catches the
    # exploit before code runs.
    #
    # Directive-by-directive:
    #   default-src 'self'         fallback: same-origin only for any fetch
    #                              type not explicitly listed below
    #   script-src 'self'          no inline scripts, no eval — index.html
    #                              has only ES module imports from /assets/
    #   style-src 'self'           same-origin styles +
    #     'unsafe-inline'          allow inline style="..." attributes that
    #                              React produces from style={{}} JSX props.
    #                              Inline styles can't execute code, only
    #                              alter visuals, so XSS risk is bounded.
    #   img-src 'self' data:       same-origin + data: URIs (tiny inlined
    #                              images, often used for placeholders) +
    #     https://*.scdn.co        Spotify CDN (album art, mosaic images)
    #     https://*.spotifycdn.com newer Spotify image hosts
    #   connect-src 'self'         fetch/XHR same-origin only. /api/* is
    #                              proxied through nginx so it counts as
    #                              same-origin from the browser's view.
    #   font-src 'self' data:      no external font CDNs, but allow inline
    #                              base64 font data URIs that some component
    #                              libraries embed in their CSS bundles
    #                              (caught during Pass 2 browser testing: a
    #                              data:application/font-woff was being blocked)
    #   frame-ancestors 'none'     modern equivalent of X-Frame-Options:
    #                              DENY (belt-and-suspenders)
    #   base-uri 'self'            block <base href> rewriting all relative
    #                              URLs (a known XSS amplifier)
    #   form-action 'self'         forms can only POST to our origin
    #   object-src 'none'          no <object>/<embed>/Flash/applets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.scdn.co https://*.spotifycdn.com; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Reverse proxy for backend API.
    # Browser hits /api/..., nginx forwards to the backend over a private
    # network. Same-origin from the browser's perspective, so no CORS needed.
    #
    # Upstream hostname: nextsound-louisgee8-api.flycast:3001
    # ------------------------------------------------------
    # In production on Fly.io, this resolves to the backend app's Flycast
    # IPv6 address — a stable internal address that Fly Proxy load-balances
    # to whichever Machine is alive. Backend never has a public IP.
    #
    # Locally in docker-compose, the same hostname resolves because we
    # registered it as a network alias on the backend service (see
    # docker-compose.yml). One config works everywhere. No envsubst.
    #
    # Trailing slash trick:
    #   proxy_pass http://host:3001;   (NO slash) -> path passed through as-is
    #   proxy_pass http://host:3001/;  (slash)    -> /api/ prefix stripped
    # We use NO trailing slash because Express mounts at /api/spotify already,
    # so the backend expects to see the full /api/spotify/... path.
    location /api/ {
        # Rate limit (Phase 3 Step 3 Pass 3).
        # Zone "api" is declared in nginx-http.conf (http context).
        #   burst=20  — allow short spikes of up to 20 over the 10r/s sustained
        #               rate. A normal user firing 5-10 calls on app open will
        #               never notice this; a scraper hitting search in a tight
        #               loop eats the burst in ~2 seconds and then gets 429.
        #   nodelay   — burst requests are served immediately. Without nodelay
        #               they'd be queued and trickled out at the sustained rate,
        #               which feels like lag to the user during legitimate spikes.
        limit_req zone=api burst=20 nodelay;

        # IMPORTANT: Port 80, NOT 3001.
        # Fly Proxy listens on port 80 at the Flycast IP and forwards to
        # the machine's internal_port (3001 in fly.api.toml). Connecting
        # to .flycast:3001 hits the Flycast IP on a port nothing is bound
        # to → TCP RST → 502. This caught us in Session 3.
        # For local docker-compose, port 3001 IS correct, so the alias in
        # docker-compose.yml needs to expose 80 -> 3001 mapping too.
        proxy_pass http://nextsound-louisgee8-api.flycast:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API timeouts. proxy_connect_timeout bumped to 30s to tolerate
        # Fly's wake-on-request flow when a backend machine is replaced
        # or cold-starting. Previously 5s caused 502s on cold paths.
        # The backend's own request timeout (10s in axios config) bounds
        # how long a single Spotify call can hang on the read side.
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # SPA routing: if the requested path does not match a real file or
    # directory, fall back to index.html so React Router can handle it.
    # Without this, refreshing on /discover or /playlist/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The HTML shell must NEVER be cached. It contains <script> references to
    # content-hashed asset filenames (index-abc123.js). When we deploy a new
    # version, the asset hashes change but the URL of index.html stays the
    # same. If a browser or CDN holds onto an old index.html, the user keeps
    # requesting old hashes and never sees the deploy. no-cache + must-revalidate
    # forces the browser to check with the server on every load.
    # Phase 3 Step 4 (service worker hygiene) addresses the in-app cache layer
    # for the same reason at a different level.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP must be repeated here. nginx's add_header inheritance rule: any
        # location block that declares add_header LOSES inherited add_headers
        # from the parent context — so we re-emit them all in each location.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.scdn.co https://*.spotifycdn.com; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Vite outputs content-hashed filenames into /assets/ (e.g. index-abc123.js).
    # If the content changes, the hash changes, so it is safe to cache these
    # aggressively. Returning visitors load the app instantly.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Compress text-based responses. JS and CSS bundles often compress 70%+.
    # Images are already compressed, so no point re-gzipping them.
    # Phase 3 expansion: woff/woff2 fonts and SVG can also compress well.
    # manifest+json is for PWA manifests. Skipping tiny responses (<256 bytes)
    # because gzip overhead exceeds savings for small payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/manifest+json
        application/x-font-ttf
        font/opentype
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;
}
