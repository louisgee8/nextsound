server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy for backend API.
    # Browser hits /api/..., nginx forwards to the backend container over the
    # internal compose network. Same-origin from the browser's perspective,
    # so we no longer need CORS on the backend.
    #
    # Trailing slash trick:
    #   proxy_pass http://backend:3001;   (NO slash) -> path passed through as-is
    #   proxy_pass http://backend:3001/;  (slash)    -> /api/ prefix stripped
    # We use NO trailing slash because Express mounts at /api/spotify already,
    # so the backend expects to see the full /api/spotify/... path.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Reasonable API timeouts (not long-poll / SSE).
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # SPA routing: if the requested path does not match a real file or
    # directory, fall back to index.html so React Router can handle it.
    # Without this, refreshing on /discover or /playlist/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite outputs content-hashed filenames into /assets/ (e.g. index-abc123.js).
    # If the content changes, the hash changes, so it is safe to cache these
    # aggressively. Returning visitors load the app instantly.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compress text-based responses. JS and CSS bundles often compress 70%+.
    # Images are already compressed, so no point re-gzipping them.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
