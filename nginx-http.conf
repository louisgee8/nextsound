# ============================================================
# nginx-http.conf
# ============================================================
# Directives in this file live in nginx's `http` context.
# Loaded via the base nginx:alpine image's `include /etc/nginx/conf.d/*.conf;`
# which evaluates every .conf file inside the http {} block of the parent
# /etc/nginx/nginx.conf. The 00- prefix in the mounted filename guarantees
# this loads before default.conf so the zones we declare here are visible
# to the limit_req directives inside the server block.
#
# Why this file exists separately from nginx.conf:
#   - limit_req_zone must be declared in http context (not server)
#   - real_ip_header / set_real_ip_from must also be in http context
#   - Our default.conf is a server block already nested inside http, so
#     these directives can't go there

# ------------------------------------------------------------
# Real client IP behind a reverse-proxy edge
# ------------------------------------------------------------
# Phase 3 Step 6 (Fly.io deploy) will need real_ip rewriting so that
# rate limiting on /api/* keys off the TRUE client IP, not Fly.io's
# edge IP (which every user shares). Without that, one bad actor
# behind Fly's edge would DoS every other user through the same bucket.
#
# IMPORTANT (caught during Pass 3 testing): if we set both directives
# below AND the request has no X-Forwarded-For header (as happens with
# direct curl to localhost in development), nginx's realip module nulls
# out $binary_remote_addr. Empty zone keys are silently skipped by
# limit_req — meaning ALL requests pass through unlimited. We hit that
# exact bug with `set_real_ip_from 0.0.0.0/0` + curl flood test.
#
# Resolution: leave real_ip directives OFF for now. Locally and pre-deploy
# they are a no-op and the rate limit functions correctly using the direct
# connection IP. Re-enable in Step 6 with Fly.io's specific CIDR range
# (likely 10.0.0.0/8 for their internal mesh, or query Fly docs for the
# precise public proxy IPs) — never with a 0.0.0.0/0 trust-all.
#
# real_ip_header X-Forwarded-For;       # enable in Step 6
# set_real_ip_from 10.0.0.0/8;          # set to Fly.io's actual edge CIDR

# ------------------------------------------------------------
# Rate limiting on /api/ endpoints
# ------------------------------------------------------------
# Zone "api": 10 MB of shared memory storing one entry per unique client IP.
# 10 MB holds approximately 160,000 IPs (each entry ~64 bytes). More than
# enough for a portfolio app; can shrink later if memory becomes a concern.
#
# rate=10r/s — sustained 10 requests per second per IP. Normal humans
# clicking around the UI never approach this. A bot or scraper hitting
# /api/spotify/search in a tight loop blows past it almost instantly.
#
# The actual burst behavior (how many over-rate requests are allowed
# in a spike) is set on the limit_req directive inside default.conf,
# not here — keeping the zone definition reusable.
#
# $binary_remote_addr (not $remote_addr) uses the 4-byte binary form of
# the IP, saving memory and lookup time vs the text form.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# When a request exceeds the rate, return 429 Too Many Requests instead
# of nginx's default 503 Service Unavailable. 429 is the correct status
# code per RFC 6585 and is what monitoring/alerting tools expect to see
# for rate-limit events. 503 falsely signals "service is down."
limit_req_status 429;
